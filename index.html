<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>台北晚餐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070c;--surface:#0c0c14;--card:#12121c;--card2:#181826;
  --accent:#c8a87c;--accent-dim:#8b7355;--accent-glow:rgba(200,168,124,0.12);
  --text:#ece6dc;--text2:#7a7368;--text3:#3d3935;
  --border:rgba(200,168,124,0.08);
  --serif:'Noto Serif TC','PMingLiU',Georgia,serif;
  --ease:cubic-bezier(.22,1,.36,1);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:var(--serif);-webkit-font-smoothing:antialiased}

/* ══ Background Slideshow ══ */
.bg-layer{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;
  transition:opacity 3s ease;opacity:0;will-change:opacity}
.bg-layer.active{opacity:1}
.bg-overlay{position:fixed;inset:0;z-index:0;
  background:linear-gradient(180deg,rgba(7,7,12,.92) 0%,rgba(7,7,12,.82) 40%,rgba(7,7,12,.90) 100%);
  backdrop-filter:blur(30px) saturate(1.2);-webkit-backdrop-filter:blur(30px) saturate(1.2)}
.bg-vignette{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(7,7,12,.6) 100%)}

/* ══ Grain ══ */
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:512px}

/* ══ Ambient Orbs ══ */
.amb{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0;animation:orbF 24s ease-in-out infinite}
.orb:nth-child(1){width:600px;height:600px;background:radial-gradient(circle,rgba(200,168,124,.08) 0%,transparent 70%);top:-15%;right:-10%;animation-duration:28s}
.orb:nth-child(2){width:500px;height:500px;background:radial-gradient(circle,rgba(100,80,140,.05) 0%,transparent 70%);bottom:-20%;left:-15%;animation-delay:-10s;animation-duration:32s}
.orb:nth-child(3){width:450px;height:450px;background:radial-gradient(circle,rgba(180,100,120,.04) 0%,transparent 70%);top:40%;left:50%;animation-delay:-18s;animation-duration:36s}
@keyframes orbF{0%,100%{opacity:0;transform:scale(1) translate(0,0)}
  20%{opacity:1;transform:scale(1.15) translate(15px,-10px)}
  50%{opacity:.5;transform:scale(.9) translate(-10px,15px)}
  80%{opacity:1;transform:scale(1.05) translate(8px,-5px)}}

/* ══ Floating Bokeh ══ */
.bokeh{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.bokeh-dot{position:absolute;border-radius:50%;opacity:0;animation:bokehFloat linear infinite}
@keyframes bokehFloat{
  0%{opacity:0;transform:translateY(0) scale(0.5)}
  10%{opacity:var(--bok-a)}
  90%{opacity:var(--bok-a)}
  100%{opacity:0;transform:translateY(calc(-100vh - 40px)) scale(1)}}

/* ══ Cursor Glow ══ */
.cursor-glow{position:fixed;z-index:1;pointer-events:none;
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(200,168,124,.06) 0%,rgba(200,168,124,.02) 30%,transparent 70%);
  transform:translate(-50%,-50%);transition:left .4s ease-out,top .4s ease-out,opacity .8s;
  opacity:0;will-change:left,top}
.cursor-glow.active{opacity:1}

/* ══ Starfield (inside center circle) ══ */
.starfield{position:absolute;inset:0;z-index:0;pointer-events:none;border-radius:50%;opacity:.8}

/* ══ Wheel Breathing Glow ══ */
.wheel-wrap::after{content:'';position:absolute;inset:-20px;border-radius:50%;
  background:radial-gradient(circle,rgba(200,168,124,.03) 0%,transparent 60%);
  pointer-events:none;z-index:0;animation:wheelBreathe 6s ease-in-out infinite}
@keyframes wheelBreathe{
  0%,100%{opacity:.3;transform:scale(1)}
  50%{opacity:1;transform:scale(1.03)}}

/* ══ App Layout ══ */
#app{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:0 20px;overflow:hidden}

/* ══ Header ══ */
header{width:100%;max-width:640px;display:flex;justify-content:space-between;align-items:baseline;
  padding:clamp(16px,3vh,32px) 0 0;flex-shrink:0;opacity:0;transform:translateY(12px)}
.title{font-size:clamp(11px,1.5vw,13px);font-weight:200;letter-spacing:.35em;color:var(--accent-dim);opacity:.6;
  text-transform:uppercase}
.music-btn{font-family:var(--serif);font-size:10px;font-weight:300;letter-spacing:.18em;
  color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 0;transition:color .5s}
.music-btn:hover,.music-btn.on{color:var(--accent-dim)}
.music-btn.on::after{content:'';display:inline-block;width:4px;height:4px;background:var(--accent);
  border-radius:50%;margin-left:6px;vertical-align:middle;animation:pls 2.5s ease-in-out infinite}
@keyframes pls{0%,100%{opacity:.3}50%{opacity:1}}

/* ══ Entry Screen ══ */
.entry{position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity 1.2s ease,visibility 0s 1.2s;overflow:hidden}
.entry.gone{opacity:0;visibility:hidden;pointer-events:none}
.entry-bg{position:absolute;inset:0;background-size:cover;background-position:center;
  opacity:.08;filter:blur(20px) saturate(1.4)}
.entry-vignette{position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 20%,rgba(7,7,12,.85) 100%)}
.entry-content{position:relative;z-index:1;text-align:center;padding:0 40px}
.entry-sub{font-size:clamp(9px,1.2vw,10px);font-weight:200;letter-spacing:.6em;
  color:var(--accent-dim);opacity:0;animation:entryFadeUp 1.2s ease .3s forwards;
  text-transform:uppercase;margin-bottom:clamp(10px,2vh,16px)}
.entry-title{font-size:clamp(32px,8vw,56px);font-weight:200;letter-spacing:.2em;
  color:var(--text);opacity:0;animation:entryFadeUp 1.2s ease .6s forwards;
  line-height:1.3;text-shadow:0 4px 30px rgba(0,0,0,.4)}
.entry-line{width:40px;height:1px;background:var(--accent);margin:clamp(18px,3vh,28px) auto;
  opacity:0;animation:entryFadeUp 1s ease .9s forwards;transform:scaleX(0);
  animation-name:entryLine}
.entry-hint{font-size:clamp(10px,1.3vw,11px);font-weight:300;letter-spacing:.35em;
  color:var(--text3);opacity:0;animation:entryFadeUp 1s ease 1.2s forwards;
  text-transform:uppercase}
.entry-hint span{display:inline-block;animation:entryPulse 3s ease-in-out 2s infinite}
@keyframes entryFadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes entryLine{from{opacity:0;transform:scaleX(0)}to{opacity:.4;transform:scaleX(1)}}
@keyframes entryPulse{0%,100%{opacity:.35}50%{opacity:.7}}

/* ══ Categories ══ */
.cats{display:flex;flex-wrap:wrap;justify-content:center;gap:3px 6px;
  margin:clamp(8px,1.5vh,14px) 0 clamp(8px,1.5vh,14px);
  opacity:0}
.cat{font-family:var(--serif);font-size:clamp(10px,1.3vw,11px);font-weight:400;letter-spacing:.12em;
  color:var(--text3);background:transparent;border:none;cursor:pointer;padding:5px 10px;
  transition:color .4s var(--ease),background .4s var(--ease);position:relative;white-space:nowrap;
  border-radius:20px}
.cat::after{content:'';position:absolute;bottom:1px;left:10px;right:10px;height:1px;
  background:var(--accent);transform:scaleX(0);transition:transform .4s var(--ease),box-shadow .4s var(--ease);
  box-shadow:0 0 0 rgba(200,168,124,0)}
.cat:hover{color:var(--accent);background:rgba(200,168,124,.04)}
.cat:hover::after{box-shadow:0 2px 8px rgba(200,168,124,.12)}
.cat.on{color:var(--accent)}
.cat.on::after{transform:scaleX(1);box-shadow:0 2px 8px rgba(200,168,124,.15)}

/* ══ Wheel ══ */
.wheel-wrap{position:relative;width:min(440px,74vw,52vh);height:min(440px,74vw,52vh);
  margin:0 auto;flex-shrink:0;opacity:0}
canvas{width:100%;height:100%;display:block}

/* ── Outer glow ring ── */
.wheel-wrap::before{content:'';position:absolute;inset:-6px;border-radius:50%;
  border:1px solid rgba(200,168,124,.06);
  box-shadow:0 0 40px rgba(200,168,124,.03),inset 0 0 40px rgba(200,168,124,.02);
  pointer-events:none;z-index:1}

.pointer{position:absolute;top:4%;left:50%;transform:translateX(-50%);z-index:6;
  width:4px;height:46%;
  background:linear-gradient(to bottom,var(--accent),rgba(200,168,124,.12));
  border-radius:2px;
  filter:drop-shadow(0 0 8px rgba(200,168,124,.4)) drop-shadow(0 1px 3px rgba(200,168,124,.6))}
.pointer::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  border-left:7px solid transparent;border-right:7px solid transparent;
  border-bottom:10px solid var(--accent)}
.pointer::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(240,215,175,.9),var(--accent));
  box-shadow:0 0 10px rgba(200,168,124,.5)}

/* ── Center (glassmorphism) ── */
.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:36%;height:36%;border-radius:50%;
  background:rgba(10,10,16,.75);
  backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);
  border:1px solid rgba(200,168,124,.06);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:4;pointer-events:none;transition:all .8s var(--ease);cursor:default;
  overflow:hidden}
.center.glow{pointer-events:auto;cursor:pointer;border-color:rgba(200,168,124,.2);
  box-shadow:0 0 60px rgba(200,168,124,.08),0 0 20px rgba(200,168,124,.04)}

/* ── Spinning state ── */
.center.spinning{border-color:rgba(200,168,124,.15);
  box-shadow:0 0 40px rgba(200,168,124,.06)}
.center.spinning::after{content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,rgba(200,168,124,.04) 0%,transparent 65%);
  animation:centerPulse 1.2s ease-in-out infinite}
@keyframes centerPulse{
  0%,100%{transform:scale(.85);opacity:.4}
  50%{transform:scale(1.1);opacity:1}}

.center-spin-text{position:absolute;font-size:clamp(12px,2vw,14px);font-weight:300;
  letter-spacing:.25em;color:var(--accent);opacity:0;transition:opacity .3s;
  text-align:center;pointer-events:none;white-space:nowrap}
.center.spinning .center-spin-text{opacity:1;animation:spinTextCycle 2.4s ease-in-out infinite}
@keyframes spinTextCycle{
  0%,100%{opacity:.3;transform:scale(.96)}
  50%{opacity:1;transform:scale(1)}}

/* ring orbit during spin */
.center-ring{position:absolute;inset:6px;border-radius:50%;
  border:1px solid transparent;opacity:0;transition:opacity .4s}
.center.spinning .center-ring{opacity:1;
  border-color:rgba(200,168,124,.08);
  animation:ringRotate 3s linear infinite}
@keyframes ringRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.center-ring::before{content:'';position:absolute;top:-1px;left:50%;
  width:4px;height:4px;border-radius:50%;background:var(--accent);
  transform:translateX(-50%);box-shadow:0 0 6px rgba(200,168,124,.4)}

.center-main{font-size:clamp(11px,2.8vw,22px);font-weight:500;letter-spacing:.05em;
  color:var(--text);text-align:center;line-height:1.3;transition:all .4s;
  text-shadow:0 2px 12px rgba(0,0,0,.5);
  padding:0 6px;word-break:keep-all;max-width:85%;overflow:hidden;z-index:1}
.center-sub{font-size:clamp(9px,1.2vw,10px);font-weight:300;letter-spacing:.2em;
  color:var(--accent-dim);margin-top:4px;opacity:0;transition:opacity .8s .4s;
  text-transform:uppercase}
.center-sub.show{opacity:.7}

/* ══ Spin Button ══ */
.spin-area{margin-top:clamp(10px,2vh,20px);opacity:0}
.spin-btn{font-family:var(--serif);font-size:clamp(12px,1.5vw,13px);font-weight:400;
  letter-spacing:.4em;color:var(--accent);background:transparent;
  border:1px solid rgba(200,168,124,.15);padding:12px 56px;cursor:pointer;
  transition:all .5s var(--ease);position:relative;overflow:hidden}
.spin-btn::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(200,168,124,.06) 0%,transparent 60%);
  opacity:0;transition:opacity .5s}
.spin-btn:hover{border-color:rgba(200,168,124,.35);color:var(--text);
  box-shadow:0 0 30px rgba(200,168,124,.06)}
.spin-btn:hover::before{opacity:1}
.spin-btn:active{transform:scale(.97)}
.spin-btn:disabled{pointer-events:none;border-color:rgba(200,168,124,.06);color:var(--text3)}

/* ══ History ══ */
.history{position:fixed;bottom:clamp(14px,2.5vh,28px);left:0;right:0;text-align:center;z-index:3;
  transition:bottom .5s var(--ease);opacity:0;transform:translateY(12px)}
.history.lifted{bottom:110px}
.hist-label{font-size:9px;font-weight:300;letter-spacing:.22em;color:rgba(255,255,255,.45);margin-bottom:5px;
  opacity:0;transition:opacity .6s;text-transform:uppercase}
.hist-label.show{opacity:1}
.hist-items{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;padding:0 20px}
.hist-item{font-size:clamp(9px,1.1vw,10px);font-weight:300;color:rgba(255,255,255,.5);letter-spacing:.06em;
  opacity:0;animation:fu .5s var(--ease) forwards;position:relative;
  cursor:pointer;transition:color .4s var(--ease),border-color .4s var(--ease),text-shadow .4s var(--ease);
  border-bottom:1px solid rgba(200,168,124,.06);padding-bottom:3px}
.hist-item:hover,.hist-item:active{color:var(--accent);border-bottom-color:rgba(200,168,124,.3);
  text-shadow:0 0 8px rgba(200,168,124,.1)}
.hist-item+.hist-item::before{content:'\00B7';position:absolute;left:-10px;color:var(--accent);opacity:.25}
.hist-num{font-size:clamp(8px,1vw,9px);color:var(--text3);letter-spacing:.08em;margin-right:3px;opacity:.5}

/* music bar removed — using Web Audio API */


@keyframes fu{to{opacity:1;transform:translateY(0)}}
header,.cats,.wheel-wrap,.spin-area{transform:translateY(12px)}
/* ══ Enter Transition (staggered) ══ */
#app.entered header{animation:fu .8s var(--ease) .3s forwards}
#app.entered .cats{animation:fu .8s var(--ease) .5s forwards}
#app.entered .wheel-wrap{animation:fu .8s var(--ease) .7s forwards}
#app.entered .spin-area{animation:fu .8s var(--ease) .9s forwards}
#app.entered ~ .history{animation:fu .8s var(--ease) 1.1s forwards}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:2px}
/* ══ Winner Celebration ══ */
.wheel-wrap.celebrate::before{
  border-color:rgba(200,168,124,.2);
  box-shadow:0 0 80px rgba(200,168,124,.12),0 0 160px rgba(200,168,124,.05),inset 0 0 60px rgba(200,168,124,.04);
  animation:glowPulse 2s ease-in-out}
@keyframes glowPulse{
  0%{box-shadow:0 0 40px rgba(200,168,124,.03)}
  50%{box-shadow:0 0 100px rgba(200,168,124,.18),0 0 200px rgba(200,168,124,.08)}
  100%{box-shadow:0 0 80px rgba(200,168,124,.12),0 0 160px rgba(200,168,124,.05)}}
.center.glow .center-main{animation:resultFadeUp .6s var(--ease)}
@keyframes resultFadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes centerGoldenGlow{
  0%{box-shadow:0 0 20px rgba(200,168,124,0)}
  50%{box-shadow:0 0 60px rgba(200,168,124,.15),0 0 20px rgba(200,168,124,.08)}
  100%{box-shadow:0 0 20px rgba(200,168,124,0)}}
.center.result-glow{animation:centerGoldenGlow 2s ease-in-out}

/* ── Particle Canvas ── */
#particles{position:absolute;inset:0;z-index:5;pointer-events:none}

/* ══ Recommendation Sheet ══ */
.recs-overlay{position:fixed;inset:0;z-index:90;
  background:rgba(7,7,12,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  opacity:0;pointer-events:none;transition:opacity .5s var(--ease)}
.recs-overlay.open{opacity:1;pointer-events:auto}
.recs-sheet{position:absolute;bottom:0;left:0;right:0;
  max-height:80vh;padding:0 0 clamp(30px,5vh,48px);
  transform:translateY(40px);opacity:0;
  transition:transform .6s var(--ease),opacity .5s;
  overflow-y:auto;-webkit-overflow-scrolling:touch}
.recs-overlay.open .recs-sheet{transform:translateY(0);opacity:1}
/* ── Recs Hero (full fusion) ── */
.recs-hero{position:relative;width:100%;
  height:clamp(240px,38vh,320px);overflow:hidden}
.recs-hero img{width:100%;height:100%;object-fit:cover;display:block;
  filter:brightness(.55) saturate(1.4);transition:filter 1s ease}
.recs-overlay.open .recs-hero img{filter:brightness(.55) saturate(1.4)}
.recs-hero-overlay{position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(7,7,12,.05) 0%,rgba(7,7,12,.15) 30%,rgba(7,7,12,.7) 70%,rgba(7,7,12,1) 100%)}
.recs-hero-content{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;padding:0 24px clamp(16px,3vh,28px);z-index:1;text-align:center}
.recs-hero-mood{font-size:clamp(24px,6.5vw,36px);font-weight:200;letter-spacing:.12em;
  color:var(--text);text-shadow:0 2px 30px rgba(0,0,0,.6);line-height:1.3;margin-bottom:4px}
.recs-hero-mood-sub{font-size:clamp(9px,1.2vw,10px);font-weight:300;letter-spacing:.5em;
  color:var(--accent);margin-bottom:clamp(12px,2vh,20px);text-transform:uppercase;
  text-shadow:0 1px 10px rgba(0,0,0,.5)}
.recs-hero-line{width:28px;height:1px;background:var(--accent);opacity:.4;margin-bottom:clamp(10px,1.5vh,16px)}
.recs-hero-cat{display:inline-block;font-size:clamp(9px,1.2vw,10px);font-weight:300;letter-spacing:.35em;
  color:var(--accent);border:1px solid rgba(200,168,124,.2);padding:4px 16px;
  text-transform:uppercase;margin-bottom:6px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);background:rgba(7,7,12,.3)}
.recs-hero-title{font-size:clamp(14px,2.5vw,17px);font-weight:300;letter-spacing:.15em;
  color:rgba(255,255,255,.6)}
.recs-hero-sub{font-size:clamp(9px,1.1vw,10px);font-weight:300;letter-spacing:.2em;
  color:rgba(255,255,255,.3);margin-top:2px}
.recs-filters{position:sticky;top:0;z-index:2;display:flex;justify-content:center;gap:6px;
  padding:clamp(14px,2vh,20px) 20px clamp(10px,1.5vh,16px);flex-wrap:wrap;
  background:linear-gradient(180deg,rgba(7,7,12,.98) 0%,rgba(7,7,12,.92) 70%,rgba(7,7,12,0) 100%);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.recs-filter{font-family:var(--serif);font-size:clamp(10px,1.3vw,12px);font-weight:300;
  letter-spacing:.1em;color:rgba(255,255,255,.35);background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);padding:6px 16px;cursor:pointer;
  transition:all .3s var(--ease);white-space:nowrap}
.recs-filter.on{color:var(--accent);border-color:rgba(200,168,124,.25);background:rgba(200,168,124,.08)}
.recs-filter:hover{color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.12)}
.recs-filter .filter-sub{font-size:clamp(8px,1vw,9px);color:rgba(255,255,255,.2);margin-left:4px;letter-spacing:.05em}
.recs-filter.on .filter-sub{color:rgba(200,168,124,.5)}
.recs-list{display:flex;flex-direction:column;gap:10px;max-width:480px;margin:0 auto;padding:0 20px}
.rec-card{background:rgba(18,18,28,.5);border:1px solid rgba(200,168,124,.06);
  padding:0;display:flex;gap:0;
  transition:all .5s var(--ease);cursor:pointer;
  opacity:0;transform:translateY(24px);
  position:relative;overflow:hidden}
.rec-card.show{opacity:1;transform:translateY(0)}
.rec-card::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(200,168,124,.04) 0%,transparent 50%);pointer-events:none;z-index:1}
.rec-card:active{transform:scale(.97);border-color:rgba(200,168,124,.2);

.fortune-overlay{position:fixed;inset:0;z-index:200;

/* ── progress dots ── */
.fortune-dots{display:flex;gap:12px;justify-content:center;margin-bottom:clamp(20px,3vh,28px);

.fortune-overlay.open .fortune-dots{animation:ffu .5s var(--ease) .3s forwards}

.fortune-dot.current{border-color:rgba(200,168,124,.5);animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,168,124,.15)}50%{box-shadow:0 0 0 5px rgba(200,168,124,0)}}

/* ── step label ── */
.fortune-step{font-size:clamp(11px,1.4vw,12px);font-weight:300;letter-spacing:.5em;

.fortune-luck{display:block;font-size:clamp(36px,10vw,52px);font-weight:200;

.fortune-line{width:28px;height:1px;

.fortune-act{font-family:var(--serif);font-size:clamp(13px,1.6vw,14px);font-weight:300;

.fortune-summary{opacity:0}

.fortune-sum-title{font-size:clamp(11px,1.4vw,12px);font-weight:300;letter-spacing:.5em;

@keyframes ffu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

<script>
/* ══════════════════════════════════════

   ══════════════════════════════════════ */
const CAT_IMAGES = {

  '日式':'https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=600&h=400&fit=crop&q=80',

const BG_IMAGES = [
  'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1400&h=900&fit=crop&q=80',
  'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1400&h=900&fit=crop&q=80',
  'https://images.unsplash.com/photo-1476224203421-9ac39bcb3327?w=1400&h=900&fit=crop&q=80',
  'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=1400&h=900&fit=crop&q=80',
  'https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=1400&h=900&fit=crop&q=80',
  'https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=1400&h=900&fit=crop&q=80',
];

// Preload category images for canvas
const loadedCatImg = {};
Object.entries(CAT_IMAGES).forEach(([cat, url]) => {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { loadedCatImg[cat] = img; drawWheel(currentRotation); };
  img.src = url;
});

// Background slideshow
const bgLayer1 = document.getElementById('bgLayer1');
const bgLayer2 = document.getElementById('bgLayer2');
let bgIdx = 0;
let bgActive = bgLayer1;

function initBgSlideshow() {
  if (!BG_IMAGES.length) return;
  bgLayer1.style.backgroundImage = `url(${BG_IMAGES[0]})`;
  bgLayer1.classList.add('active');
  setInterval(() => {
    bgIdx = (bgIdx + 1) % BG_IMAGES.length;
    const next = bgActive === bgLayer1 ? bgLayer2 : bgLayer1;
    next.style.backgroundImage = `url(${BG_IMAGES[bgIdx]})`;
    next.classList.add('active');
    bgActive.classList.remove('active');
    bgActive = next;
  }, 10000);
}

/* ══════════════════════════════════════
   Menu Data
   ══════════════════════════════════════ */
const DEFAULT_MENU = {
  '台式':['滷肉飯','三杯雞','蚵仔煎','牛肉麵','鹽酥雞','排骨飯','控肉飯','滷味','雞肉飯','蛤蜊湯'],
  '日式':['拉麵','壽司','丼飯','居酒屋','烏龍麵','定食','串燒','天婦羅','鰻魚飯','咖哩飯'],
  '韓式':['韓式烤肉','部隊鍋','石鍋拌飯','辣炒年糕','炸雞啤酒','豆腐鍋','冷麵','海鮮煎餅'],
  '火鍋':['麻辣鍋','酸菜白肉鍋','壽喜燒','涮涮鍋','藥膳鍋','番茄鍋','牛奶鍋','薑母鴨'],
  '西式':['義大利麵','牛排','漢堡','披薩','燉飯','焗烤','法式料理','早午餐'],
  '熱炒':['三杯中卷','蒜炒水蓮','宮保雞丁','糖醋排骨','海鮮熱炒','炒飯','蔥爆牛肉','鐵板豆腐'],
  '麵食':['乾麵','餛飩麵','刀削麵','炸醬麵','陽春麵','擔擔麵','酸辣麵','麻醬麵'],
  '東南亞':['泰式酸辣','越南河粉','綠咖哩','叻沙','海南雞飯','打拋豬','椒麻雞','月亮蝦餅'],
};
const STORAGE_KEY = 'taipei-dinner-menu';
let menuData = {};
function loadMenu() { try { const s = localStorage.getItem(STORAGE_KEY); menuData = s ? JSON.parse(s) : structuredClone(DEFAULT_MENU); } catch { menuData = structuredClone(DEFAULT_MENU); } }
function saveMenu() { localStorage.setItem(STORAGE_KEY, JSON.stringify(menuData)); }
loadMenu();

/* ══════════════════════════════════════
   State & DOM
   ══════════════════════════════════════ */
let activeCats = new Set();
let history = [];
let spinning = false;
let currentRotation = 0;
let wheelItems = [];
let winnerIdx = -1;

const catsEl = document.getElementById('cats');
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const wheelWrap = document.getElementById('wheelWrap');
const centerCircle = document.getElementById('centerCircle');
const centerMain = document.getElementById('centerMain');
const centerSub = document.getElementById('centerSub');
const spinBtn = document.getElementById('spinBtn');
const musicBtn = document.getElementById('musicBtn');
const histLabel = document.getElementById('histLabel');
const histItems = document.getElementById('histItems');
// musicBar removed — Web Audio API used instead
const historyEl = document.querySelector('.history');

/* ══════════════════════════════════════
   Categories
   ══════════════════════════════════════ */
function renderCats() {
  catsEl.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'cat' + (activeCats.size === 0 ? ' on' : '');
  all.textContent = '全部';
  all.onclick = () => { activeCats.clear(); renderCats(); refreshWheel(); };
  catsEl.appendChild(all);
  Object.keys(menuData).forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat' + (activeCats.has(c) ? ' on' : '');
    b.textContent = c;
    b.onclick = () => { activeCats.has(c) ? activeCats.delete(c) : activeCats.add(c); renderCats(); refreshWheel(); };
    catsEl.appendChild(b);
  });
}

/* ══════════════════════════════════════
   Items & Shuffle
   ══════════════════════════════════════ */
function getPool() {
  const cats = activeCats.size > 0 ? [...activeCats] : Object.keys(menuData);
  const pool = [];
  cats.forEach(c => (menuData[c]||[]).forEach(item => pool.push({ name: item, cat: c })));
  return pool;
}
function pickWheelItems() {
  const pool = getPool();
  if (pool.length <= 12) return shuffle([...pool]);
  return shuffle([...pool]).slice(0, 12);
}
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

/* ══════════════════════════════════════
   Canvas Setup
   ══════════════════════════════════════ */
let dpr = 1, wheelSize = 0;
function setupCanvas() {
  dpr = window.devicePixelRatio || 1;
  const rect = wheelWrap.getBoundingClientRect();
  wheelSize = rect.width;
  canvas.width = wheelSize * dpr;
  canvas.height = wheelSize * dpr;
  canvas.style.width = wheelSize + 'px';
  canvas.style.height = wheelSize + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
function refreshWheel() { wheelItems = pickWheelItems(); winnerIdx = -1; drawWheel(currentRotation); }

/* ══════════════════════════════════════
   Draw Wheel — with food images + dark overlay
   ══════════════════════════════════════ */
function drawWheel(rotation) {
  const cx = wheelSize / 2, cy = wheelSize / 2, r = cx - 8;
  const items = wheelItems, n = items.length;
  if (!n) return;
  const arc = (2 * Math.PI) / n;

  ctx.clearRect(0, 0, wheelSize, wheelSize);

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r + 3, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(200,168,124,0.06)';
  ctx.lineWidth = 1;
  ctx.stroke();

  items.forEach((item, i) => {
    const start = rotation + i * arc - Math.PI / 2;
    const end = start + arc;
    const isWinner = i === winnerIdx;

    ctx.save();
    // Clip to segment
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.clip();

    // Draw food image if loaded
    const img = loadedCatImg[item.cat];
    if (img && img.naturalWidth) {
      const size = r * 2.4;
      // Offset image per category for variety
      const catKeys = Object.keys(CAT_IMAGES);
      const catIdx = catKeys.indexOf(item.cat);
      const offX = (catIdx % 3 - 1) * r * 0.15;
      const offY = (Math.floor(catIdx / 3) % 2 - 0.5) * r * 0.15;
      ctx.drawImage(img, cx - size / 2 + offX, cy - size / 2 + offY, size, size);
      // Dark overlay — lighter for winner
      ctx.fillStyle = isWinner ? 'rgba(7,7,12,0.35)' : 'rgba(7,7,12,0.72)';
    } else {
      // Fallback gradient
      ctx.fillStyle = i % 2 === 0 ? '#111119' : '#0f0f17';
    }
    ctx.fillRect(0, 0, wheelSize, wheelSize);
    ctx.restore();

    // Segment divider line
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(start) * r, cy + Math.sin(start) * r);
    ctx.strokeStyle = isWinner ? 'rgba(200,168,124,0.25)' : 'rgba(200,168,124,0.07)';
    ctx.lineWidth = isWinner ? 1 : 0.5;
    ctx.stroke();
    ctx.restore();

    // Text with shadow — centered in segment
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    const isMobile = window.innerWidth <= 480;
    const fontSize = isMobile ? Math.max(14, Math.min(18, wheelSize / 20)) : Math.max(12, Math.min(16, wheelSize / 26));
    ctx.font = `${isWinner ? 600 : 400} ${fontSize}px "Noto Serif TC", serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Shadow for readability
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 1;
    ctx.fillStyle = isWinner ? '#ece6dc' : 'rgba(200,168,124,0.85)';
    // Position text at 62% radius — nicely centered in the segment band
    const textR = r * 0.62;
    ctx.fillText(item.name, textR, 0);
    ctx.restore();
  });

  // Inner shadow circle (covers segment joins at center)
  const innerR = r * 0.32;
  const ig = ctx.createRadialGradient(cx, cy, 0, cx, cy, innerR + 24);
  ig.addColorStop(0, 'rgba(10,10,16,1)');
  ig.addColorStop(0.65, 'rgba(10,10,16,.95)');
  ig.addColorStop(1, 'rgba(10,10,16,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, innerR + 24, 0, 2 * Math.PI);
  ctx.fillStyle = ig;
  ctx.fill();
}

/* ══════════════════════════════════════
   Spin
   ══════════════════════════════════════ */
function getWinnerIndex(rot) {
  const n = wheelItems.length;
  const arc = (2 * Math.PI) / n;
  const offset = (((-rot) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  return Math.floor(offset / arc) % n;
}

function spin() {
  if (spinning || wheelItems.length < 2) return;
  spinning = true;
  spinBtn.disabled = true;
  spinBtn.textContent = '...';
  centerCircle.classList.remove('glow');
  centerCircle.classList.remove('result-glow');
  centerSub.classList.remove('show');
  centerMain.textContent = '';
  centerSub.textContent = '';
  winnerIdx = -1;

  // Spinning center animation
  centerCircle.classList.add('spinning');
  const spinPhrases = ['選擇中','命運轉動','今晚吃','揭曉中','交給命運'];
  let phraseIdx = 0;
  const spinTextEl = document.getElementById('centerSpinText');
  spinTextEl.textContent = spinPhrases[0];
  if (window._phraseTimer) clearInterval(window._phraseTimer);
  window._phraseTimer = setInterval(() => {
    phraseIdx = (phraseIdx + 1) % spinPhrases.length;
    spinTextEl.style.opacity = '0';
    setTimeout(() => { spinTextEl.textContent = spinPhrases[phraseIdx]; spinTextEl.style.opacity = ''; }, 200);
  }, 900);

  wheelItems = pickWheelItems();
  drawWheel(currentRotation);

  const dur = 5000;
  const totalRot = Math.PI * 12 + Math.random() * Math.PI * 6;
  const startRot = currentRotation;
  const startTime = performance.now();
  let prevSeg = -1;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / dur, 1);
    const eased = 1 - Math.pow(1 - progress, 4);

    currentRotation = startRot + totalRot * eased;
    drawWheel(currentRotation);

    // Tick
    const n = wheelItems.length;
    const arc = (2 * Math.PI) / n;
    const seg = Math.floor(((currentRotation % (2 * Math.PI)) + 20 * Math.PI) / arc) % n;
    if (seg !== prevSeg && prevSeg !== -1) playTick(0.015 + progress * 0.035);
    prevSeg = seg;

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      winnerIdx = getWinnerIndex(currentRotation);
      drawWheel(currentRotation);

      // Shift BG to winner's category image
      const winCat = wheelItems[winnerIdx].cat;
      if (CAT_IMAGES[winCat]) {
        const next = bgActive === bgLayer1 ? bgLayer2 : bgLayer1;
        next.style.backgroundImage = `url(${CAT_IMAGES[winCat]})`;
        next.classList.add('active');
        bgActive.classList.remove('active');
        bgActive = next;
      }

      revealResult(wheelItems[winnerIdx]);
    }
  }
  requestAnimationFrame(animate);
}

/* ══════════════════════════════════════
   Particle System
   ══════════════════════════════════════ */
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let particles = [];
let pAnimId = null;

function setupParticleCanvas() {
  const rect = wheelWrap.getBoundingClientRect();
  const d = window.devicePixelRatio || 1;
  pCanvas.width = rect.width * d;
  pCanvas.height = rect.height * d;
  pCanvas.style.width = rect.width + 'px';
  pCanvas.style.height = rect.height + 'px';
  pCtx.setTransform(d, 0, 0, d, 0, 0);
}

function spawnParticles(cx, cy) {
  particles = [];
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.2 + Math.random() * 3;
    const size = 1.5 + Math.random() * 3;
    const life = 60 + Math.random() * 50;
    const gold = Math.random() > 0.3;
    particles.push({
      x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      size, life, maxLife: life, gold,
      drift: (Math.random() - 0.5) * 0.02
    });
  }
  if (pAnimId) cancelAnimationFrame(pAnimId);
  animateParticles();
}

function animateParticles() {
  const w = pCanvas.width / (window.devicePixelRatio || 1);
  const h = pCanvas.height / (window.devicePixelRatio || 1);
  pCtx.clearRect(0, 0, w, h);
  particles = particles.filter(p => p.life > 0);
  if (!particles.length) { pAnimId = null; return; }
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.02; // gravity
    p.vx += p.drift;
    p.vx *= 0.99; p.vy *= 0.99;
    p.life--;
    const alpha = (p.life / p.maxLife) * 0.8;
    const color = p.gold ? `rgba(200,168,124,${alpha})` : `rgba(236,230,220,${alpha})`;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
    pCtx.fillStyle = color;
    pCtx.shadowColor = p.gold ? 'rgba(200,168,124,0.5)' : 'rgba(236,230,220,0.3)';
    pCtx.shadowBlur = 8;
    pCtx.fill();
    pCtx.shadowBlur = 0;
  });
  pAnimId = requestAnimationFrame(animateParticles);
}

function revealResult(item) {
  // Stop spinning center
  if (window._phraseTimer) { clearInterval(window._phraseTimer); window._phraseTimer = null; }
  centerCircle.classList.remove('spinning');
  document.getElementById('centerSpinText').textContent = '';

  // Celebrate
  wheelWrap.classList.add('celebrate');
  centerCircle.classList.add('glow');

  // Haptic feedback on mobile
  if (navigator.vibrate) navigator.vibrate([50, 30, 80]);

  // Particles from center
  setupParticleCanvas();
  const rect = wheelWrap.getBoundingClientRect();
  spawnParticles(rect.width / 2, rect.height / 2);

  // Reveal text with fadeUp + golden glow
  centerMain.textContent = item.name;
  centerMain.style.opacity = '';
  centerMain.style.transform = '';
  centerMain.style.transition = '';
  centerCircle.classList.add('result-glow');

  setTimeout(() => { centerSub.textContent = item.cat; centerSub.classList.add('show'); }, 500);
  lastWinnerCat = item.cat;
  addHistory(item.name, item.cat);
  // Show restaurant recommendations after 1.5s
  setTimeout(() => showRecs(item.cat), 1500);
  setTimeout(() => {
    spinning = false; spinBtn.disabled = false; spinBtn.textContent = '再轉';
    centerMain.style.transition = '';
    wheelWrap.classList.remove('celebrate');
    centerCircle.classList.remove('result-glow');
  }, 2000);
}

/* ══════════════════════════════════════
   History
   ══════════════════════════════════════ */
function addHistory(name, cat) { history.unshift({name, cat}); if (history.length > 5) history.pop(); renderHistory(); }
function renderHistory() {
  histLabel.classList.toggle('show', history.length > 0);
  histItems.innerHTML = '';
  history.forEach((h, i) => {
    const s = document.createElement('span');
    s.className = 'hist-item';
    const num = document.createElement('span');
    num.className = 'hist-num'; num.textContent = (i + 1) + '.';
    s.appendChild(num);
    s.appendChild(document.createTextNode(h.name));
    s.style.animationDelay = `${i * .08}s`; s.style.opacity = String(1 - i * .15);
    s.onclick = () => showRecs(h.cat);
    histItems.appendChild(s);
  });
}

/* ══════════════════════════════════════
   五子棋 — Gomoku Engine
   ══════════════════════════════════════ */
(function GomokuEngine() {
  const SIZE = 15;
  const overlay = document.getElementById('gomokuOverlay');
  const canvas = document.getElementById('gomokuBoard');
  const gctx = canvas.getContext('2d');
  const statusEl = document.getElementById('gomokuStatus');
  const hintEl = document.getElementById('gomokuHint');
  const catBubble = document.getElementById('gmCatBubble');
  const catText = document.getElementById('gmCatText');
  const restartBtn = document.getElementById('gomokuRestart');
  const closeBtn = document.getElementById('gomokuClose');

  let board = []; // 0=empty, 1=AI(black), 2=player(white)
  let gameOver = false;
  let playerTurn = false;
  let moveCount = 0;
  let cellSize = 0;
  let padding = 0;
  let gdpr = 1;
  let previewR = -1, previewC = -1; // preview stone position
  let lastAiR = -1, lastAiC = -1; // AI last move for highlight
  let lastAiT = 0; // timestamp for pulse animation

  const SECRET_RESTAURANTS = [
    {name:'中山73・隱藏Bar',desc:'需要按門鈴才能進入的神秘酒吧，調酒師會依你的心情即興創作'},
    {name:'地下室的秘密',desc:'寧夏夜市巷弄B1，只有12個座位的私廚割烹，每晚僅一輪'},
    {name:'屋頂上的貓',desc:'大稻埕某棟老屋頂樓，需要爬鐵梯上去，無菜單料理只收現金'},
  ];

  /* ── Cat commentary ── */
  const CAT_THINK = ['嗯…','讓我想想','（思考中）','哼哼…'];
  const CAT_TAUNT = ['太簡單了','就這樣？','嘻嘻','再想想吧','認真一點！','弱喔～'];
  const CAT_WORRY = ['不妙…','等等…','你運氣不錯','嗯？！'];
  const CAT_WIN = ['喵哈哈！','我就說吧','不是對手～','再來一局？'];
  const CAT_LOSE = ['怎麼可能！','你作弊！','好吧…認輸','居然贏了…'];
  const pick = a => a[Math.floor(Math.random()*a.length)];

  function catSay(text, dur) {
    catText.textContent = text;
    catBubble.classList.add('show');
    setTimeout(() => catBubble.classList.remove('show'), dur || 2500);
  }

  /* ── Board init ── */
  function initBoard() {
    board = Array.from({length:SIZE}, () => Array(SIZE).fill(0));
    gameOver = false;
    playerTurn = false;
    moveCount = 0;
    statusEl.textContent = '比特幣先攻…';
    hintEl.textContent = '贏了好像可以解鎖什麼';
    catSay('我先！', 2000);
    setTimeout(() => { if (!gameOver) aiMove(); }, 600);
  }

  /* ── Canvas setup ── */
  function setupGCanvas() {
    const wrap = canvas.parentElement;
    const rect = wrap.getBoundingClientRect();
    const w = rect.width;
    gdpr = window.devicePixelRatio || 1;
    canvas.width = w * gdpr;
    canvas.height = w * gdpr;
    canvas.style.width = w + 'px';
    canvas.style.height = w + 'px';
    gctx.setTransform(gdpr, 0, 0, gdpr, 0, 0);
    padding = w * 0.04;
    cellSize = (w - padding * 2) / (SIZE - 1);
  }

  /* ── Board animation loop (for AI highlight pulse) ── */
  let boardAnimId = 0;
  function boardAnimLoop() {
    if (!overlay.classList.contains('open')) { boardAnimId = 0; return; }
    if (lastAiR >= 0 || (previewR >= 0 && playerTurn)) drawBoard();
    boardAnimId = requestAnimationFrame(boardAnimLoop);
  }
  function startBoardAnim() {
    if (!boardAnimId) boardAnimLoop();
  }

  /* ── Draw board ── */
  function drawBoard() {
    const w = canvas.width / gdpr;
    gctx.clearRect(0, 0, w, w);
    // Background
    gctx.fillStyle = 'rgba(18,18,28,.6)';
    gctx.fillRect(0, 0, w, w);
    // Grid lines
    gctx.strokeStyle = 'rgba(200,168,124,.15)';
    gctx.lineWidth = 0.5;
    for (let i = 0; i < SIZE; i++) {
      const pos = padding + i * cellSize;
      gctx.beginPath(); gctx.moveTo(padding, pos); gctx.lineTo(w - padding, pos); gctx.stroke();
      gctx.beginPath(); gctx.moveTo(pos, padding); gctx.lineTo(pos, w - padding); gctx.stroke();
    }
    // Star points
    const stars = SIZE === 15 ? [[3,3],[3,11],[7,7],[11,3],[11,11]] : [[3,3],[3,11],[7,7],[11,3],[11,11]];
    gctx.fillStyle = 'rgba(200,168,124,.25)';
    stars.forEach(([r,c]) => {
      gctx.beginPath();
      gctx.arc(padding + c * cellSize, padding + r * cellSize, 2.5, 0, Math.PI * 2);
      gctx.fill();
    });
    // Stones
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] === 0) continue;
        const cx = padding + c * cellSize;
        const cy = padding + r * cellSize;
        const radius = cellSize * 0.42;
        // Shadow
        gctx.beginPath();
        gctx.arc(cx + 1, cy + 1, radius, 0, Math.PI * 2);
        gctx.fillStyle = 'rgba(0,0,0,.3)';
        gctx.fill();
        // Stone
        const grad = gctx.createRadialGradient(cx - radius * 0.3, cy - radius * 0.3, 0, cx, cy, radius);
        if (board[r][c] === 1) {
          grad.addColorStop(0, '#555');
          grad.addColorStop(1, '#111');
        } else {
          grad.addColorStop(0, '#fff');
          grad.addColorStop(0.8, '#ccc');
          grad.addColorStop(1, '#aaa');
        }
        gctx.beginPath();
        gctx.arc(cx, cy, radius, 0, Math.PI * 2);
        gctx.fillStyle = grad;
        gctx.fill();
        gctx.strokeStyle = board[r][c] === 1 ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.15)';
        gctx.lineWidth = 0.5;
        gctx.stroke();
      }
    }
    // AI last move highlight (pulsing golden ring + dot)
    if (lastAiR >= 0 && lastAiC >= 0) {
      const ax = padding + lastAiC * cellSize;
      const ay = padding + lastAiR * cellSize;
      const ar = cellSize * 0.42;
      const pulse = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
      // Outer glow ring
      gctx.beginPath(); gctx.arc(ax, ay, ar + 4, 0, Math.PI * 2);
      gctx.strokeStyle = `rgba(200,168,124,${(0.6 * pulse).toFixed(2)})`;
      gctx.lineWidth = 2; gctx.stroke();
      // Small red dot in center
      gctx.beginPath(); gctx.arc(ax, ay, 2.5, 0, Math.PI * 2);
      gctx.fillStyle = `rgba(220,80,80,${(0.8 * pulse).toFixed(2)})`;
      gctx.fill();
    }
    // Preview stone (semi-transparent + pulsing ring)
    if (previewR >= 0 && previewC >= 0 && board[previewR][previewC] === 0 && playerTurn && !gameOver) {
      const px = padding + previewC * cellSize;
      const py = padding + previewR * cellSize;
      const pr = cellSize * 0.42;
      // Ghost stone
      gctx.globalAlpha = 0.45;
      const pg = gctx.createRadialGradient(px - pr*0.3, py - pr*0.3, 0, px, py, pr);
      pg.addColorStop(0, '#fff'); pg.addColorStop(0.8, '#ccc'); pg.addColorStop(1, '#aaa');
      gctx.beginPath(); gctx.arc(px, py, pr, 0, Math.PI * 2);
      gctx.fillStyle = pg; gctx.fill();
      gctx.globalAlpha = 1;
      // Pulsing ring
      gctx.beginPath(); gctx.arc(px, py, pr + 3, 0, Math.PI * 2);
      gctx.strokeStyle = 'rgba(200,168,124,.6)'; gctx.lineWidth = 1.5; gctx.stroke();
      // "點擊確認" hint
      gctx.font = `${Math.max(9, cellSize * 0.55)}px sans-serif`;
      gctx.fillStyle = 'rgba(200,168,124,.8)';
      gctx.textAlign = 'center';
      gctx.fillText('再點確認', px, py - pr - 5);
    }
  }

  /* ── Win check ── */
  function checkWin(r, c, player) {
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      let count = 1;
      for (let d = 1; d < 5; d++) { const nr = r+dr*d, nc = c+dc*d; if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===player) count++; else break; }
      for (let d = 1; d < 5; d++) { const nr = r-dr*d, nc = c-dc*d; if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===player) count++; else break; }
      if (count >= 5) return true;
    }
    return false;
  }

  /* ══ AI Engine — Threat-based + Minimax ══ */
  const SCORES = { five:1000000, openFour:100000, four:10000, openThree:5000, three:800, openTwo:120, two:15 };

  function countLine(r, c, dr, dc, player) {
    let count = 0, openEnds = 0;
    // Forward
    let fr = r + dr, fc = c + dc, fcount = 0;
    while (fr>=0&&fr<SIZE&&fc>=0&&fc<SIZE&&board[fr][fc]===player) { fcount++; fr+=dr; fc+=dc; }
    if (fr>=0&&fr<SIZE&&fc>=0&&fc<SIZE&&board[fr][fc]===0) openEnds++;
    // Backward
    let br = r - dr, bc = c - dc, bcount = 0;
    while (br>=0&&br<SIZE&&bc>=0&&bc<SIZE&&board[br][bc]===player) { bcount++; br-=dr; bc-=dc; }
    if (br>=0&&br<SIZE&&bc>=0&&bc<SIZE&&board[br][bc]===0) openEnds++;
    count = fcount + bcount; // not counting center
    return { count, openEnds };
  }

  function evaluatePosition(r, c, player) {
    if (board[r][c] !== 0) return 0;
    board[r][c] = player;
    let score = 0;
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr,dc] of dirs) {
      const { count, openEnds } = countLine(r, c, dr, dc, player);
      const total = count + 1; // include the placed stone
      if (total >= 5) score += SCORES.five;
      else if (total === 4 && openEnds === 2) score += SCORES.openFour;
      else if (total === 4 && openEnds === 1) score += SCORES.four;
      else if (total === 3 && openEnds === 2) score += SCORES.openThree;
      else if (total === 3 && openEnds === 1) score += SCORES.three;
      else if (total === 2 && openEnds === 2) score += SCORES.openTwo;
      else if (total === 2 && openEnds === 1) score += SCORES.two;
    }
    board[r][c] = 0;
    return score;
  }

  function getCandidates() {
    const cands = new Set();
    const range = 2;
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] === 0) continue;
        for (let dr = -range; dr <= range; dr++) {
          for (let dc = -range; dc <= range; dc++) {
            const nr = r+dr, nc = c+dc;
            if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===0) cands.add(nr*SIZE+nc);
          }
        }
      }
    }
    if (cands.size === 0) cands.add(7*SIZE+7);
    return [...cands].map(v => [Math.floor(v/SIZE), v%SIZE]);
  }

  function boardScore(player) {
    let score = 0;
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] === 0) continue;
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for (const [dr,dc] of dirs) {
          // Only count forward to avoid double-counting
          const { count, openEnds } = countLine(r, c, dr, dc, board[r][c]);
          const total = count + 1;
          let s = 0;
          if (total >= 5) s = SCORES.five;
          else if (total === 4 && openEnds === 2) s = SCORES.openFour;
          else if (total === 4 && openEnds === 1) s = SCORES.four;
          else if (total === 3 && openEnds === 2) s = SCORES.openThree;
          else if (total === 3 && openEnds === 1) s = SCORES.three;
          else if (total === 2 && openEnds === 2) s = SCORES.openTwo;
          else if (total === 2 && openEnds === 1) s = SCORES.two;
          score += board[r][c] === player ? s : -s * 1.1;
        }
      }
    }
    return score;
  }

  function minimax(depth, alpha, beta, isMax) {
    // Quick win/loss check from last move is handled by caller
    if (depth === 0) return boardScore(1); // AI is player 1

    const candidates = getCandidates();
    // Sort by heuristic for better pruning
    const player = isMax ? 1 : 2;
    candidates.sort((a,b) => {
      const sa = evaluatePosition(a[0],a[1],player) + evaluatePosition(a[0],a[1],player===1?2:1)*0.9;
      const sb = evaluatePosition(b[0],b[1],player) + evaluatePosition(b[0],b[1],player===1?2:1)*0.9;
      return sb - sa;
    });

    // Limit branching
    const topCands = candidates.slice(0, 12);

    if (isMax) {
      let maxEval = -Infinity;
      for (const [r,c] of topCands) {
        board[r][c] = 1;
        if (checkWin(r,c,1)) { board[r][c]=0; return SCORES.five * (depth+1); }
        const ev = minimax(depth-1, alpha, beta, false);
        board[r][c] = 0;
        maxEval = Math.max(maxEval, ev);
        alpha = Math.max(alpha, ev);
        if (beta <= alpha) break;
      }
      return maxEval;
    } else {
      let minEval = Infinity;
      for (const [r,c] of topCands) {
        board[r][c] = 2;
        if (checkWin(r,c,2)) { board[r][c]=0; return -SCORES.five * (depth+1); }
        const ev = minimax(depth-1, alpha, beta, true);
        board[r][c] = 0;
        minEval = Math.min(minEval, ev);
        beta = Math.min(beta, ev);
        if (beta <= alpha) break;
      }
      return minEval;
    }
  }

  function aiMove() {
    statusEl.textContent = '比特幣思考中…';
    catSay(pick(CAT_THINK), 2000);

    setTimeout(() => {
      if (gameOver) return;
      // First: check immediate win (AI=1)
      const candidates = getCandidates();
      for (const [r,c] of candidates) {
        board[r][c] = 1;
        if (checkWin(r,c,1)) { board[r][c]=0; placeStone(r,c,1); return; }
        board[r][c] = 0;
      }
      // Second: block player(2) immediate win
      for (const [r,c] of candidates) {
        board[r][c] = 2;
        if (checkWin(r,c,2)) { board[r][c]=0; placeStone(r,c,1); return; }
        board[r][c] = 0;
      }

      // Minimax with depth based on move count
      const depth = moveCount < 6 ? 2 : (moveCount < 20 ? 3 : 4);
      let bestScore = -Infinity, bestMove = candidates[0];

      // Score and sort candidates
      const scored = candidates.map(([r,c]) => {
        const atk = evaluatePosition(r,c,1);
        const def = evaluatePosition(r,c,2);
        return { r, c, h: atk + def * 1.05 };
      }).sort((a,b) => b.h - a.h).slice(0, 15);

      for (const {r,c} of scored) {
        board[r][c] = 1;
        const sc = minimax(depth, -Infinity, Infinity, false);
        board[r][c] = 0;
        if (sc > bestScore) { bestScore = sc; bestMove = [r,c]; }
      }

      placeStone(bestMove[0], bestMove[1], 1);

      if (!gameOver) {
        // Taunt or worry
        const playerThreat = scored.some(s => s.h > SCORES.openThree);
        catSay(pick(playerThreat ? CAT_WORRY : CAT_TAUNT), 2500);
      }
    }, 300 + Math.random() * 400);
  }

  function placeStone(r, c, player) {
    board[r][c] = player;
    moveCount++;
    previewR = -1; previewC = -1;
    if (player === 1) { lastAiR = r; lastAiC = c; }
    drawBoard();

    if (checkWin(r, c, player)) {
      gameOver = true;
      if (player === 2) {
        statusEl.textContent = '你贏了！';
        catSay(pick(CAT_LOSE), 4000);
        hintEl.textContent = '';
        setTimeout(() => showSecretMenu(), 1500);
      } else {
        statusEl.textContent = '比特幣贏了！';
        catSay(pick(CAT_WIN), 4000);
        hintEl.textContent = '再來一局？';
      }
      if (typeof _track === 'function') _track('gomoku_end', { winner: player === 2 ? 'player' : 'ai' });
      return;
    }
    if (moveCount >= SIZE * SIZE) {
      gameOver = true;
      statusEl.textContent = '平手！';
      catSay('竟然平手…', 3000);
      return;
    }
    if (player === 2) {
      playerTurn = false;
      aiMove();
    } else {
      playerTurn = true;
      statusEl.textContent = '你的回合（白子）';
    }
  }

  /* ── Secret Menu Reveal ── */
  function showSecretMenu() {
    const wrap = canvas.parentElement;
    let html = `<div class="gomoku-secret">
      <span class="gomoku-secret-icon">🏆</span>
      <div class="gomoku-secret-title">隱 藏 菜 單</div>
      <div class="gomoku-secret-sub">恭喜你打敗了比特幣！<br>解鎖了只有贏家才知道的秘密餐廳</div>
      <div class="gomoku-secret-list">`;
    SECRET_RESTAURANTS.forEach(r => {
      html += `<div class="gomoku-secret-item">
        <div class="gomoku-secret-name">${r.name}</div>
        <div class="gomoku-secret-desc">${r.desc}</div>
      </div>`;
    });
    html += `</div>
      <div style="margin-top:20px">
        <button class="gomoku-act gomoku-act-primary" onclick="this.closest('.gomoku-secret').remove();document.getElementById('gomokuBoard').style.display='block'">返回棋盤</button>
      </div>
    </div>`;
    canvas.style.display = 'none';
    const div = document.createElement('div');
    div.innerHTML = html;
    wrap.appendChild(div.firstElementChild);
  }

  /* ── Tap helper: preview + confirm ── */
  function handleTap(mx, my) {
    if (gameOver || !playerTurn) return;
    const col = Math.round((mx - padding) / cellSize);
    const row = Math.round((my - padding) / cellSize);
    if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) return;
    if (board[row][col] !== 0) return;
    // Same spot = confirm
    if (previewR === row && previewC === col) {
      previewR = -1; previewC = -1;
      placeStone(row, col, 2);
    } else {
      // Show preview
      previewR = row; previewC = col;
      drawBoard();
    }
  }

  /* ── Click handler (desktop) ── */
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    handleTap(e.clientX - rect.left, e.clientY - rect.top);
  });

  /* ── Touch support (mobile) ── */
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const t = e.changedTouches[0];
    handleTap(t.clientX - rect.left, t.clientY - rect.top);
  });

  /* ── Open / Close ── */
  window.openGomoku = function() {
    overlay.classList.add('open');
    setupGCanvas();
    lastAiR = -1; lastAiC = -1;
    initBoard();
    drawBoard();
    startBoardAnim();
    if (typeof _track === 'function') _track('gomoku_open');
  };

  closeBtn.onclick = () => {
    overlay.classList.remove('open');
    // Restore canvas if hidden by secret menu
    canvas.style.display = 'block';
    const sec = overlay.querySelector('.gomoku-secret');
    if (sec) sec.remove();
  };
  restartBtn.onclick = () => {
    canvas.style.display = 'block';
    const sec = overlay.querySelector('.gomoku-secret');
    if (sec) sec.remove();
    setupGCanvas();
    initBoard();
    drawBoard();
  };
  overlay.addEventListener('click', e => { if (e.target === overlay) closeBtn.click(); });
  window.addEventListener('resize', () => { if (overlay.classList.contains('open')) { setupGCanvas(); drawBoard(); } });
})();

function renderStarsSvg(rating) {
  const full = Math.floor(rating);
  const hasHalf = (rating - full) >= 0.3;
  const total = full + (hasHalf ? 1 : 0);
  const empty = 5 - total;
  let html = '';
  const star = '★';
  for (let i = 0; i < full; i++) html += `<span class="rec-star" style="animation-delay:${i*0.06}s">${star}</span>`;
  if (hasHalf) html += `<span class="rec-star dim" style="animation-delay:${full*0.06}s">${star}</span>`;
  for (let i = 0; i < empty; i++) html += `<span class="rec-star dim" style="animation-delay:${(total+i)*0.06}s">${star}</span>`;
  return html;
}

/* ── Price Tier Logic ── */
function getPriceTier(priceStr) {
  const m = priceStr.replace(/,/g, '').match(/(\d+)/);
  if (!m) return 'mid';
  const v = parseInt(m[1]);
  if (v < 400) return 'low';
  if (v < 1000) return 'mid';
  return 'high';
}

let currentRecsCat = '';
let currentTierFilter = 'all';
const recsFilters = document.getElementById('recsFilters');

function renderRecCards(cat, tier) {
  const list = RESTAURANTS[cat];
  if (!list || !list.length) return;
  recsList.innerHTML = '';
  const filtered = tier === 'all' ? list : list.filter(r => getPriceTier(r.price) === tier);

  if (!filtered.length) {
    recsList.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--text3);font-size:clamp(12px,1.5vw,14px);letter-spacing:.1em">此價位暫無推薦餐廳</div>`;
    return;
  }

  filtered.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'rec-card';
    const tierLabel = getPriceTier(r.price) === 'low' ? '低價' : getPriceTier(r.price) === 'high' ? '高價' : '平價';
    card.innerHTML = `
      <div class="rec-img"><img src="${r.img}" alt="${r.name}" loading="lazy" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=300&h=300&fit=crop&q=80'"></div>
      <div class="rec-body">
        <div class="rec-top">
          <span class="rec-name">${r.name}</span>
          <span class="rec-score-badge">${r.stars}</span>
        </div>
        <div class="rec-stars">${renderStarsSvg(r.stars)}<span class="rec-reviews">${r.reviews} 則評論</span></div>
        <div class="rec-info">
          <span class="rec-price">${r.price}</span>
          <span class="rec-area">${r.area}</span>
        </div>
        <div class="rec-desc">${r.desc}</div>
        <div class="rec-quotes">
          <div class="rec-quote-good"><span class="rec-qt">好評</span>「${r.best}」</div>
          <div class="rec-quote-bad"><span class="rec-qt">提醒</span>「${r.worst}」</div>
        </div>
      </div>`;
    recsList.appendChild(card);
    setTimeout(() => card.classList.add('show'), 60 + i * 80);
  });
}

function showRecs(cat) {
  const list = RESTAURANTS[cat];
  if (!list || !list.length) return;
  if (typeof _track === 'function') _track('recs_open', { cat });
  currentRecsCat = cat;
  currentTierFilter = 'all';
  // Hero image & mood text
  recsHeroImg.src = CAT_HERO_IMAGES[cat] || '';
  const moods = CAT_MOODS[cat] || ['今晚吃這個'];
  recsHeroMood.textContent = moods[Math.floor(Math.random() * moods.length)];
  recsHeroMoodSub.textContent = CAT_MOOD_SUBS[cat] || '';
  recsCatTag.textContent = cat;
  // Reset filters
  recsFilters.querySelectorAll('.recs-filter').forEach(b => b.classList.toggle('on', b.dataset.tier === 'all'));
  // Scroll sheet to top
  const sheet = recsOverlay.querySelector('.recs-sheet');
  if (sheet) sheet.scrollTop = 0;
  renderRecCards(cat, 'all');
  recsOverlay.classList.add('open');
}

// Filter click handlers
recsFilters.addEventListener('click', e => {
  const btn = e.target.closest('.recs-filter');
  if (!btn || !currentRecsCat) return;
  const tier = btn.dataset.tier;
  if (tier === currentTierFilter) return;
  currentTierFilter = tier;
  recsFilters.querySelectorAll('.recs-filter').forEach(b => b.classList.toggle('on', b.dataset.tier === tier));
  renderRecCards(currentRecsCat, tier);
});

/* ══ Music — Local MP3 (HTML5 Audio) ══ */
let musicOn = false;
const bgmAudio = new Audio('bgm.mp3');
bgmAudio.loop = true;
bgmAudio.volume = 0.6;

function startMusic() {
  bgmAudio.volume = 0.6;
  bgmAudio.muted = false;
  bgmAudio.play().then(() => {
    musicOn = true;
    musicBtn.classList.add('on');
  }).catch(() => { musicOn = false; });
}

/* Try autoplay on page load: muted first (allowed by browsers), then unmute on first click */
bgmAudio.muted = true;
bgmAudio.play().then(() => {
  musicOn = true;
  musicBtn.classList.add('on');
  /* Unmute on first user interaction */
  document.addEventListener('click', function _unmute() {
    bgmAudio.muted = false;
    bgmAudio.volume = 0.6;
    document.removeEventListener('click', _unmute);
  }, { once: true });
}).catch(() => {});

function stopMusic() {
  bgmAudio.pause();
  musicOn = false;
  musicBtn.classList.remove('on');
}

function toggleMusic() {
  if (!musicOn) startMusic();
  else stopMusic();
}

/* ── Entry Screen ── */
function enterApp() {
  const entry = document.getElementById('entry');
  entry.classList.add('gone');
  document.getElementById('app').classList.add('entered');
  /* ★ onclick = user gesture → browsers allow audio play ★ */
  startMusic();
}

/* ══════════════════════════════════════
   Tick Sound
   ══════════════════════════════════════ */
let tickCtx = null;
function playTick(vol) {
  if (!tickCtx) tickCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (tickCtx.state === 'suspended') tickCtx.resume();
  const osc = tickCtx.createOscillator();
  osc.type = 'sine'; osc.frequency.value = 680;
  const g = tickCtx.createGain();
  g.gain.setValueAtTime(vol || 0.02, tickCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, tickCtx.currentTime + 0.05);
  osc.connect(g); g.connect(tickCtx.destination);
  osc.start(); osc.stop(tickCtx.currentTime + 0.05);
}

function getWeatherIcon(code) {
  if (code === 0) return '☀';
  if ([1,2].includes(code)) return '⛅';
  if (code === 3) return '☁';
  if ([45,48].includes(code)) return '🌫';
  if ([51,53,55].includes(code)) return '🌦';
  if ([61,63,65,80,81,82].includes(code)) return '🌧';
  if ([71,73,75,77,85,86].includes(code)) return '❄';
  if ([95,96,99].includes(code)) return '⛈';
  return '🌙';
}
function getWeatherName(code) {
  if (code === 0) return '晴';
  if ([1,2].includes(code)) return '多雲';
  if (code === 3) return '陰';
  if ([45,48].includes(code)) return '霧';
  if ([51,53,55].includes(code)) return '小雨';
  if ([61,63,65,80,81,82].includes(code)) return '雨';
  if ([95,96,99].includes(code)) return '雷雨';
  return '';
}
function getWeatherMoodText(code, temp) {
  const rain = [51,53,55,61,63,65,80,81,82].includes(code);
  const thunder = [95,96,99].includes(code);
  if (thunder) return '雷雨夜，窩進小店最浪漫';
  if (rain && temp < 20) return '雨天微涼，需要一碗熱湯';
  if (rain) return '下雨天，找間溫暖的店躲雨';
  if (temp < 12) return '冷冷的夜，吃點暖心的吧';
  if (temp < 18) return '微涼的風，適合散步覓食';
  if (temp < 24) return '舒服的溫度，慢慢享受';
  if (temp < 28) return '暖暖的夜，適合坐戶外';
  return '熱熱的，來點冰涼的吧';
}
async function fetchWeather() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=25.033&longitude=121.565&current_weather=true&timezone=Asia%2FTaipei');
    const data = await res.json();
    const cw = data.current_weather;
    const temp = Math.round(cw.temperature);
    const code = cw.weathercode;
    document.getElementById('weatherIcon').textContent = getWeatherIcon(code);
    document.getElementById('weatherTemp').textContent = `台北 ${temp}°C ${getWeatherName(code)}`;
    document.getElementById('weatherMood').textContent = getWeatherMoodText(code, temp);
    document.getElementById('weather').classList.add('loaded');
  } catch(e) { /* silent fail */ }
}

function getFortuneDateKey() {
  const d = new Date();
  return `fortune_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getFortuneState() {
  try { return JSON.parse(localStorage.getItem(getFortuneDateKey()) || 'null'); } catch(e) { return null; }
}
function saveFortuneState() {
  localStorage.setItem(getFortuneDateKey(), JSON.stringify({ count: fortuneDraws.length, draws: fortuneDraws, bonus: fortuneBonusUsed }));
  updateFortuneBtn();
}
let fortuneBonusUsed = false;

function updateFortuneBtn() {
  const btn = document.getElementById('fortuneBtn');
  if (fortuneDraws.length >= FORTUNE_MAX) {
    btn.textContent = '貪心鬼';
    btn.classList.add('greedy');
  } else {
    btn.textContent = '抽食籤';
    btn.classList.remove('greedy');
  }
}

// Restore state on load
(function restoreFortuneState() {
  const s = getFortuneState();
  if (s && s.draws) {
    fortuneDraws = s.draws;
    fortuneBonusUsed = !!s.bonus;
    usedCats = s.draws.map(d => d.cat);
  }
  updateFortuneBtn();
})();

function pickRandomCat() {
  const allCats = Object.keys(CAT_REASONS);
  const available = allCats.filter(c => !usedCats.includes(c));
  const pool = available.length > 0 ? available : allCats;
  return pool[Math.floor(Math.random() * pool.length)];
}

function buildDotsHTML(current) {
  // current = 0-indexed step about to show (0,1,2)
  let html = '<div class="fortune-dots">';
  for (let i = 0; i < FORTUNE_MAX; i++) {
    const cls = i < current ? 'fortune-dot filled' : i === current ? 'fortune-dot current' : 'fortune-dot';
    html += `<div class="${cls}"></div>`;
  }
  html += '</div>';
  return html;
}

function renderFortuneCard(step, f) {
  const isGolden = step === 2;
  const remainText = step < 2 ? `還剩 ${2 - step} 籤` : '';

  fortuneCard.className = 'fortune-card' + (isGolden ? ' golden' : '');
  fortuneCard.innerHTML = `
    <div class="fortune-deco-top"></div>
    ${buildDotsHTML(step)}
    <div class="fortune-step">${STEP_LABELS[step]}</div>
    <div class="fortune-luck">${f.luck}</div>
    <div class="fortune-poem">${f.poem}</div>
    <div class="fortune-line"></div>
    <div class="fortune-rec">
      <div class="fortune-rec-label">今晚推薦你吃</div>
      <div class="fortune-rec-cat">${f.cat}</div>
      <div class="fortune-rec-reason">${f.reason}</div>
    </div>
    <div class="fortune-tip">— ${f.tip}</div>
    <div class="fortune-actions">
      ${step < 2
        ? `<button class="fortune-act fortune-act-go" id="fNext">下一籤</button>
           <button class="fortune-act fortune-act-secondary" id="fClose">收起</button>`
        : `<button class="fortune-act fortune-act-go" id="fShowAll">揭曉三道好運</button>
           <button class="fortune-act fortune-act-secondary" id="fClose">收起</button>`
      }
    </div>
    <div class="fortune-deco-bot"></div>`;

  // Bind
  document.getElementById('fClose').onclick = () => fortuneOverlay.classList.remove('open');

  if (step < 2) {
    document.getElementById('fNext').onclick = () => {
      if (typeof _track === 'function') _track('fortune_next', { step: step + 2 });
      fortuneOverlay.classList.remove('open');
      void fortuneCard.offsetWidth;
      fortuneCard.classList.add('shake');
      if (navigator.vibrate) navigator.vibrate([20, 30, 20]);
      setTimeout(() => {
        fortuneCard.classList.remove('shake');
        doDrawFortune();
      }, 450);
    };
  } else {
    document.getElementById('fShowAll').onclick = () => showFortuneSummary();
  }
}

function doDrawFortune() {
  // Pick fortune
  let idx;
  do { idx = Math.floor(Math.random() * FORTUNES.length); } while (idx === lastFortuneIdx && FORTUNES.length > 1);
  lastFortuneIdx = idx;
  const f = FORTUNES[idx];

  // Pick category
  const cat = pickRandomCat();
  usedCats.push(cat);
  const reasons = CAT_REASONS[cat];
  const reason = reasons[Math.floor(Math.random() * reasons.length)];

  const draw = { luck: f.luck, poem: f.poem, tip: f.tip, cat, reason };
  fortuneDraws.push(draw);
  saveFortuneState();

  const step = fortuneDraws.length - 1; // 0, 1, 2, or 3 (bonus)

  fortuneOverlay.classList.remove('open');
  void fortuneCard.offsetWidth;

  renderFortuneCard(Math.min(step, 2), draw);
  fortuneOverlay.classList.add('open');
  if (navigator.vibrate) navigator.vibrate(step === 2 ? [30, 40, 30] : 30);
}

function drawFortune() {
  const totalUsed = fortuneDraws.length;
  if (typeof _track === 'function') _track('fortune_draw', { attempt: totalUsed + 1 });

  if (fortuneBonusUsed && totalUsed > FORTUNE_MAX) {
    showFortuneLimit('locked');
    return;
  }
  if (totalUsed >= FORTUNE_MAX && !fortuneBonusUsed) {
    showFortuneLimit('greedy');
    return;
  }
  if (totalUsed >= FORTUNE_MAX + FORTUNE_BONUS) {
    showFortuneLimit('locked');
    return;
  }

  doDrawFortune();
}

document.getElementById('fortuneBtn').onclick = drawFortune;
fortuneOverlay.onclick = e => { if (e.target === fortuneOverlay) fortuneOverlay.classList.remove('open'); };

/* ══ Starfield (center circle galaxy) ══ */
(function initStarfield() {
  const c = document.getElementById('starfield');
  const parent = document.getElementById('centerCircle');
  if (!c || !parent) return;
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  let size, half, stars = [];

  function resize() {
    size = parent.offsetWidth;
    half = size / 2;
    c.width = size * dpr; c.height = size * dpr;
    c.style.width = size + 'px'; c.style.height = size + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function makeStar() {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * half * 0.9;
    return {
      angle, dist,
      r: Math.random() * 1.1 + 0.2,
      a: Math.random() * 0.7 + 0.15,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      phase: Math.random() * Math.PI * 2,
      orbitSpeed: (Math.random() * 0.0003 + 0.0001) * (Math.random() < 0.5 ? 1 : -1)
    };
  }

  function init() {
    resize();
    stars = [];
    const count = Math.min(Math.floor(size * size / 300), 120);
    for (let i = 0; i < count; i++) stars.push(makeStar());
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, size, size);
    t++;
    for (const s of stars) {
      s.angle += s.orbitSpeed;
      const x = half + Math.cos(s.angle) * s.dist;
      const y = half + Math.sin(s.angle) * s.dist;
      const twinkle = Math.sin(t * s.twinkleSpeed + s.phase) * 0.35 + 0.65;
      const alpha = s.a * twinkle;
      ctx.beginPath();
      ctx.arc(x, y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,168,124,${alpha.toFixed(2)})`;
      ctx.fill();
      if (s.r > 0.8) {
        ctx.beginPath();
        ctx.arc(x, y, s.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,168,124,${(alpha * 0.08).toFixed(3)})`;
        ctx.fill();
      }
    }
    requestAnimationFrame(draw);
  }

  init();
  draw();
  window.addEventListener('resize', init);
})();

function getSmartGreeting() {
  const h = new Date().getHours();

}

const _AK = '_d8x';
let _userIP = 'unknown';

(async function _initAnalytics() {
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const d = await r.json();
    _userIP = d.ip || 'unknown';
  } catch(e) {}
  _track('page_load', { referrer: document.referrer, screen: `${screen.width}x${screen.height}`, ua: navigator.userAgent });
})();

function _getStore() {
  try { return JSON.parse(localStorage.getItem(_AK) || '{}'); } catch(e) { return {}; }
}

function _track(action, meta) {
  const store = _getStore();
  const today = new Date().toISOString().slice(0, 10);
  if (!store.sessions) store.sessions = {};
  if (!store.sessions[today]) store.sessions[today] = [];
  store.sessions[today].push({
    t: Date.now(),
    ts: new Date().toISOString(),
    ip: _userIP,
    a: action,
    m: meta || null
  });
  // Keep max 30 days
  const keys = Object.keys(store.sessions).sort();
  while (keys.length > 30) { delete store.sessions[keys.shift()]; }
  try { localStorage.setItem(_AK, JSON.stringify(store)); } catch(e) {}
}

    if (a === 'center_click') return `（${m.cat}）`;
